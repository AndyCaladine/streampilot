{% extends "overlays/base.html" %}

{% block content %}
<!-- 
  Alerts overlay
  This page lives inside OBS as a Browser Source.
  It listens for 'alert' WebSocket events and displays
  follow, sub, raid and bits notifications.
  Background is transparent — OBS shows through.
-->
<div class="overlay-stage" id="alertStage"></div>
{% endblock %}

{% block scripts %}
<script>
  // Pass the token and channel info to the overlay JS
  const OVERLAY_TOKEN   = "{{ token }}";
  const OVERLAY_TYPE    = "alerts";
  const OVERLAY_CHANNEL = {{ channel_id }};
</script>
<script src="{{ url_for('static', filename='js/overlays/alerts.js') }}"></script>
{% endblock %}
