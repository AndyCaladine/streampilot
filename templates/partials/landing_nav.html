<nav class="landing-nav">
  <div class="landing-nav__logo">
    <img src="{{ url_for('static', filename='images/smalllogo.light.PNG') }}"
         alt="StreamPilot" class="landing-nav__icon logo-light">
    <img src="{{ url_for('static', filename='images/smalllogo.dark.PNG') }}"
         alt="StreamPilot" class="landing-nav__icon logo-dark">
    <span class="landing-nav__wordmark">STREAM<span>PILOT</span></span>
  </div>
  <div class="landing-nav__links">
    <a href="/#features">Features</a>
    <a href="/#beta">Beta</a>
    <span class="badge badge--danger landing-nav__beta-badge">
      <span class="landing-nav__beta-dot"></span>
      Private Beta
    </span>
    <button class="mode-toggle" id="landingThemeToggle" aria-label="Toggle theme">
      <span class="mode-toggle__day">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

        Day Mode
      </span>
      <span class="mode-toggle__night">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">

<script>
  (function () {
    var toggle = document.getElementById("landingThemeToggle");
    if (!toggle) return;
    toggle.addEventListener("click", function () {
      var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("sp_theme", next);
    });
  })();
</script>
