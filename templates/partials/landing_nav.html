<nav class="landing-nav">
  <div class="landing-nav__logo">
    <img src="{{ url_for('static', filename='images/smalllogo.light.PNG') }}"
         alt="StreamPilot" class="landing-nav__icon logo-light">
    <img src="{{ url_for('static', filename='images/smalllogo.dark.PNG') }}"
         alt="StreamPilot" class="landing-nav__icon logo-dark">
    <span class="landing-nav__wordmark">STREAM<span>PILOT</span></span>
  </div>
  <div class="landing-nav__links">
    <a href="/#features">Features</a>
    <a href="/#beta">Beta</a>
    <span class="badge badge--danger landing-nav__beta-badge">
      <span class="landing-nav__beta-dot"></span>
      Private Beta
    </span>
    <label class="led-toggle" id="themeToggle" aria-label="Toggle theme">
      <input type="checkbox" id="themeToggleInput">
      <div class="led-toggle__track"></div>
      <svg class="led-toggle__svg" viewBox="-4 -4 72 46" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <defs>
          <filter id="ledGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="tight"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="mid"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="wide"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="bloom"/>
            <feMerge>
              <feMergeNode in="bloom"/>
              <feMergeNode in="wide"/>
              <feMergeNode in="mid"/>
              <feMergeNode in="tight"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <rect class="led-toggle__ring-bg" x="2" y="2" width="60" height="34" rx="14" ry="14"/>
        <rect class="led-toggle__arc" id="ledArc" x="8" y="2" width="73" height="38" rx="14" ry="14"/>
      </svg>
      <div class="led-toggle__knob">
        <div class="led-toggle__knob-outer">
          <div class="led-toggle__knob-face">
            <div class="led-toggle__knob-dot"></div>
          </div>
        </div>
      </div>
    </label>
    <a href="{{ url_for('login') }}" class="btn btn--primary btn--sm">Log in</a>
  </div>
</nav>

<script>
  (function () {
    const toggle = document.getElementById("themeToggleInput");
    const label  = document.getElementById("themeToggle");
    if (!toggle || !label) return;
    const current = document.documentElement.getAttribute("data-theme") || "light";
    toggle.checked = current === "dark";
    label.classList.toggle("dark", current === "dark");
    toggle.addEventListener("change", function () {
      const next = toggle.checked ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("sp_theme", next);
      label.classList.toggle("dark", toggle.checked);
    });
  })();
</script>
