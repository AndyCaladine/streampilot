{% extends "admin/dashboard.html" %}

{% block admin_title %}Create Admin User{% endblock %}

{% block admin_content %}
<div class="admin-form-card admin-form-card--full">

  <form method="POST" action="{{ url_for('admin.create_admin_user') }}" class="admin-form">

    <div class="form-row">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text"
               id="username"
               name="username"
               class="form-input"
               autocapitalize="off"
               required>
      </div>
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email"
               id="email"
               name="email"
               class="form-input"
               required>
      </div>
    </div>

    <div class="form-group">
      <label for="role" class="form-label">Role</label>
      <select id="role" name="role" class="form-select">
        <option value="worker">Worker — Read only</option>
        <option value="manager">Manager — Platform management</option>
        <option value="owner">Owner — Full access</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="password" class="form-label">Temporary Password</label>
        <input type="password"
               id="password"
               name="password"
               class="form-input"
               autocomplete="new-password"
               required>
        <span class="form-hint">
          They will be forced to change this on first login.
        </span>
      </div>
      <div class="form-group">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password"
               id="confirm_password"
               name="confirm_password"
               class="form-input"
               autocomplete="new-password"
               required>
      </div>
    </div>

    <div class="admin-form__actions">
      <button type="submit" class="btn btn--primary">Create Admin User</button>
      <a href="{{ url_for('admin.admin_users') }}" class="btn btn--secondary">Cancel</a>
    </div>

  </form>

</div>
{% endblock %}
