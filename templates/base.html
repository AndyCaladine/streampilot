<!DOCTYPE html>
<html lang="en" data-theme="{{ current_user_theme | default('light') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StreamPilot{% endblock %}</title>

  <!-- Anti-flash theme script — must run before CSS loads -->
  <script>
(function () {
  var stored = localStorage.getItem("sp_theme");
  var current = document.documentElement.getAttribute("data-theme");
  if (current === "light" && stored === "dark") {
    document.documentElement.setAttribute("data-theme", "dark");
  }
  localStorage.setItem("sp_theme", document.documentElement.getAttribute("data-theme"));

  // Apply saved colour theme
  var colour = localStorage.getItem("sp_colour");
  if (colour && colour !== "default") {
    document.documentElement.setAttribute("data-colour", colour);
  }
})();
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <!-- Base CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/variables.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/reset.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/typography.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/layout.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/utilities.css') }}">

  <!-- Component CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/navigation.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/cards.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/forms.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/badges.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/feedback.css') }}">

  <!-- Page specific CSS -->
  {% block styles %}{% endblock %}

</head>
<body class="{% block body_class %}{% endblock %}">

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash--{{ category }}">
            <span>{{ message }}</span>
            <button class="flash-close" onclick="this.parentElement.remove()">&#x2715;</button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- Page content -->
  {% block content %}{% endblock %}

  <!-- Main JS — loaded on every page -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>

  <!-- Page specific JS -->
  {% block scripts %}{% endblock %}

</body>
</html>
